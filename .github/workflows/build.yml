name: Build prootz APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          SDKMANAGER=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager
          yes | $SDKMANAGER --licenses > /dev/null 2>&1 || true
          $SDKMANAGER --install 'platforms;android-34' || echo "platform already installed"
          $SDKMANAGER --install 'ndk;29.0.14206865' || echo "ndk already installed"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode keystore
        shell: bash
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > prootz-release.jks

      - name: Build release APK
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_HOME=/usr/local/lib/android/sdk
          ./gradlew assembleRelease \
            -Pkeystore.file=prootz-release.jks \
            -Pkeystore.store.password="${{ secrets.KEYSTORE_STORE_PASSWORD }}" \
            -Pkeystore.key.alias="${{ secrets.KEYSTORE_ALIAS }}" \
            -Pkeystore.key.password="${{ secrets.KEYSTORE_KEY_PASSWORD }}"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: prootz-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
